# Configuration du projet de détection du code vestimentaire

# Dataset
dataset:
  name: "fashionpedia_4_categories"
  source: "huggingface"
  url: "detection-datasets/fashionpedia_4_categories"
  splits:
    train: 0.90
    val: 0.05
    test: 0.05

# Catégories du code vestimentaire ENSITECH
categories:
  - id: 0
    name: "accessoire_interdit"
    description: "Casquette, chapeau, bonnet, bandana, couvre-chef"
    fashionpedia_id: 0
    color: "#FF6B6B"

  - id: 1
    name: "vetement_interdit"
    description: "Crop top, dos ouvert, tenue sport, short, bermuda, mini-jupe, baggy, jean troué"
    fashionpedia_id: 2
    color: "#45B7D1"

  - id: 2
    name: "chaussure_interdite"
    description: "Tongs"
    fashionpedia_id: 3
    color: "#FFA07A"

# Catégories ignorées
ignored_categories:
  - id: 1
    name: "sac"
    description: "Sacs (non concernés par le règlement)"

# Modèle YOLO
model:
  architecture: "yolov8"
  size: "n" # Options: n (nano), s (small), m (medium), l (large), x (xlarge)
  pretrained: true

  # Hyperparamètres d'entraînement
  training:
    epochs: 100
    batch_size: 16
    image_size: 640
    patience: 50

    # Optimiseur
    optimizer: "Adam"
    lr0: 0.01
    lrf: 0.01
    momentum: 0.937
    weight_decay: 0.0005

    # Augmentation de données
    augmentation:
      hsv_h: 0.015
      hsv_s: 0.7
      hsv_v: 0.4
      degrees: 0.0
      translate: 0.1
      scale: 0.5
      shear: 0.0
      perspective: 0.0
      flipud: 0.0
      fliplr: 0.5
      mosaic: 1.0
      mixup: 0.0

    # Checkpoints
    save_period: 10
    cache: false
    workers: 8

  # Inférence
  inference:
    conf_threshold: 0.5 # Seuil de confiance
    iou_threshold: 0.45 # Seuil IoU pour NMS
    max_detections: 300
    device: "auto" # auto, cpu, cuda, mps

# Objectifs de performance
targets:
  precision: 0.90 # ≥ 90%
  inference_time: 2.0 # < 2 secondes
  false_positive_rate: 0.05 # < 5%
  fps_realtime: 30 # FPS pour vidéo temps réel

# Chemins
paths:
  data_raw: "data/raw"
  data_processed: "data/processed"
  data_annotations: "data/annotations"
  models: "models"
  logs: "logs"
  results: "results"
  notebooks: "notebooks"

# Règlement intérieur ENSITECH
dress_code:
  article: 17
  page: 8
  description: "Tenue correcte, décente et adaptée à un cadre pédagogique et professionnel"

  interdictions:
    bas:
      - "Pantalon baggy"
      - "Short"
      - "Bermuda"
      - "Jean troué / déchiré"
      - "Mini-jupe"

    hauts:
      - "T-shirt au-dessus du nombril (crop top)"
      - "Haut ouvert dans le dos"
      - "Tenue de sport (leggings, brassière, short de sport, survêtement moulant)"

    chaussures:
      - "Tongs"

    accessoires:
      - "Casquette"
      - "Chapeau"
      - "Bonnet"
      - "Bandana"
      - "Tout autre couvre-chef"

# Alertes
alerts:
  email:
    enabled: true
    recipients:
      - "responsable@ensitech.fr"

  mobile:
    enabled: true
    platform: "firebase" # ou "custom"

  content:
    - "image"
    - "type_infraction"
    - "timestamp"
    - "confidence"
    - "location"

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/app.log"
  tensorboard: true
  wandb: false

# Sécurité et conformité
security:
  rgpd_compliant: true
  data_retention_days: 30
  anonymization: true
  encryption: true
  access_control: true
